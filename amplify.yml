version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Run the NEW app-specific build script instead of the default library build
        - npm run build:app
  artifacts:
    # Change the output folder from 'dist' to 'dist-app'
    baseDirectory: dist-app
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
